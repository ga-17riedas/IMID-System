spring:
  datasource:
    url: jdbc:mysql://localhost:3306/imid_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  sql:
    init:
      mode: never
      continue-on-error: true
  main:
    allow-bean-definition-overriding: true
  servlet:
    context-path: /
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
      enabled: true
      location: D:/IMID/temp
  mvc:
    servlet:
      path: /
    cors:
      allowed-origins: http://localhost:3000
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
    static-path-pattern: /static/**
  security:
    filter:
      order: 1
  web:
    resources:
      static-locations:
        - classpath:/static/
        - file:${model.storage.path}
        - file:${upload.path}

# Application Configuration
app:
  jwtSecret: 04ca023b39512e46d0c2cf4b48d5aac61d34302994c87ed4eff225dcf3b0a218739f3897051a057f9b846a69ea2927a587044164b7bae5e1306219d50b588cb1
  jwtExpirationInMs: 86400000  # 24 hours
  base-url: http://localhost:8080
  upload:
    path: D:/IMID/uploads/
    dir: uploads
  base:
    url: http://localhost:8080

# Server Configuration
server:
  port: 8080

# Logging Configuration
logging:
  level:
    root: INFO
    com.example.medicalsystem: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    com.example.medicalsystem.service: DEBUG

# CORS Configuration
mvc:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:8080
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
    allow-credentials: true
    max-age: 3600

# Upload Configuration
upload:
  path: D:/IMID/uploads/

# Report Configuration
report:
  font:
    path: C:/Windows/Fonts/simfang.ttf

# Python Configuration
python:
  executable: python
  timeout: 30000
  script:
    path: D:/IMID/scripts
    analyze: analyze.py

# Model Configuration
model:
  storage:
    path: D:/IMID/models
  path:
    brain-tumor: D:/IMID/IMID_model/saved_models/brain_tumor_model.pt
    covid: D:/IMID/IMID_model/saved_models/covid_model.pt 